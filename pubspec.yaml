name: emitrace
description: >
  Flutter in-app bug reporting SDK for QA and developers with logs, network
  tracing, screenshots, and shareable debug reports.
version: 1.0.2
homepage: https://github.com/RITIKKUMAWAT009/emitrace
repository: https://github.com/RITIKKUMAWAT009/emitrace
issue_tracker: https://github.com/RITIKKUMAWAT009/emitrace/issues
topics:
  - flutter
  - debugging
  - logging
  - qa
  - dio

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
