name: emitrace
description: >
  One-tap Flutter debugging toolkit that captures logs, route transitions,
  Dio network activity, errors, screenshots, and shareable bug reports.
version: 1.1.0
homepage: https://github.com/RITIKKUMAWAT009/emitrace
repository: https://github.com/RITIKKUMAWAT009/emitrace
issue_tracker: https://github.com/RITIKKUMAWAT009/emitrace/issues
topics:
  - flutter
  - debugging
  - logs
  - dio
  - qa

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  package_info_plus: ">=8.0.0 <11.0.0"
  share_plus: ">=10.0.0 <14.0.0"
  path_provider: ^2.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
