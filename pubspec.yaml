    sdk: flutter
  dio: ^5.4.0
  package_info_plus: ">=8.0.0 <11.0.0"
  share_plus: ">=10.0.0 <14.0.0"
  path_provider: ^2.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

